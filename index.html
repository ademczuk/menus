<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MenuVision — Restaurant Photo Menus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a0a;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    margin-bottom: 0.3rem;
    background: linear-gradient(135deg, #c41e3a, #ff6b6b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #888;
    font-size: 0.95rem;
    font-weight: 300;
    margin-bottom: 2.5rem;
    letter-spacing: 0.5px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
    max-width: 1000px;
    width: 100%;
  }
  .card {
    background: #151515;
    border-radius: 16px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform 0.2s, box-shadow 0.2s;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(196,30,58,0.15);
  }
  .card-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 1.2rem 1.4rem;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .card-tagline {
    color: #888;
    font-size: 0.85rem;
    font-weight: 300;
  }
  .card-meta {
    margin-top: 0.8rem;
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
    color: #666;
  }
  .card-meta span { display: flex; align-items: center; gap: 0.3rem; }
  footer {
    margin-top: 3rem;
    color: #444;
    font-size: 0.75rem;
    text-align: center;
  }
  footer a { color: #c41e3a; text-decoration: none; }
</style>
</head>
<body>
  <h1>MenuVision</h1>
  <p class="subtitle">See the food before you order</p>
  <div class="grid" id="menu-grid">
    <!-- Menus are listed here -->
  </div>
  <footer>
    <p>Built with MenuVision &mdash; AI-powered restaurant photo menus</p>
  </footer>

  <script>
    const menus = [
      {
            "name": "Maxingstüberl",
            "tagline": "Wiener Küche · Vienna",
            "file": "Maxingstüberl_Menu.html",
            "img": "images/maxingstüberl/M1.jpg",
            "items": 33,
            "cuisine": "Austrian"
      },
      {
            "name": "Odysseus",
            "tagline": "Greek Restaurant · Vienna",
            "file": "Odysseus_Menu.html",
            "img": "images/odysseus/A1.jpg",
            "items": 61,
            "cuisine": "Greek"
      },
      {
            "name": "Restaurant Beim Hofmeister",
            "tagline": "",
            "file": "Restaurant_Beim_Hofmeister_Menu.html",
            "img": "images/restaurant_beim_hofmeister/S1.jpg",
            "items": 49,
            "cuisine": ""
      },
      {
            "name": "Restaurant Herzig",
            "tagline": "Wiener Küche · Vienna",
            "file": "Restaurant_Herzig_Menu.html",
            "img": "images/restaurant_herzig/M1.jpg",
            "items": 3,
            "cuisine": "Fine Dining"
      },
      {
            "name": "Shoyu",
            "tagline": "Japanese Kitchen · Vienna",
            "file": "Shoyu_Menu.html",
            "img": "images/shoyu/T1.jpg",
            "items": 80,
            "cuisine": "Japanese"
      },
      {
            "name": "TanTan",
            "tagline": "Sichuan Cuisine · Vienna",
            "file": "TanTan_Menu.html",
            "img": "images/nano/M1.jpg",
            "items": 75,
            "cuisine": "Chinese"
      }
];

    const grid = document.getElementById('menu-grid');
    menus.forEach(m => {
      const a = document.createElement('a');
      a.href = m.file;
      a.className = 'card';
      a.innerHTML = `
        <img class="card-img" src="${m.img}" alt="${m.name}">
        <div class="card-body">
          <div class="card-name">${m.name}</div>
          <div class="card-tagline">${m.tagline}</div>
          <div class="card-meta">
            <span>${m.items} dishes</span>
            <span>${m.cuisine}</span>
          </div>
        </div>
      `;
      grid.appendChild(a);
    });
  </script>
</body>
</html>

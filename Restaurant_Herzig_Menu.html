<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Restaurant Herzig</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@400;700&family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Inter', 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #e0d8d0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ---- Header ---- */
.site-header {
  background: #0a0a0a;
  text-align: center;
  padding: 14px 16px 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-brand {
  font-weight: 700;
  font-size: 1.6rem;
  letter-spacing: 0.22em;
  color: #fff;
}
.header-tagline {
  font-weight: 300;
  font-size: 0.7rem;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
}

/* ---- Tab Bar ---- */
.tab-bar {
  display: flex;
  gap: 0;
  margin-top: 12px;
  border-bottom: 2px solid #222;
}
.tab {
  flex: 1;
  background: none;
  border: none;
  color: #666;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 600;
  padding: 10px 0;
  cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
}
.tab.active {
  color: #c41e3a;
  border-bottom-color: #c41e3a;
}
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ---- Category Pill Nav ---- */
.cat-nav {
  background: #0a0a0a;
  padding: 6px 8px 8px;
  overflow-x: auto;
  scrollbar-width: none;
  display: flex;
  gap: 6px;
  -webkit-overflow-scrolling: touch;
  border-bottom: 1px solid #1a1a1a;
}
.cat-nav::-webkit-scrollbar { display: none; }
.cat-pill {
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid #333;
  background: transparent;
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 500;
  color: #888;
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.cat-pill--active {
  background: #c41e3a;
  color: #fff;
  border-color: #c41e3a;
}

/* ---- Instagram Grid ---- */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

/* ---- Tile ---- */
.menu-tile {
  position: relative;
  overflow: hidden;
  aspect-ratio: 9 / 16;
  cursor: pointer;
  -webkit-user-select: none;
  user-select: none;
}
.tile-image {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #111;
}
.tile-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s ease;
}
.menu-tile:hover .tile-image img { transform: scale(1.05); }
.menu-tile::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 45%;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  pointer-events: none;
}
.tile-caption {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  padding: 8px 10px;
  gap: 6px;
}
.tile-name-wrap { flex: 1; min-width: 0; }
.tile-name {
  display: block;
  font-weight: 600;
  font-size: 0.75rem;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
}
.tile-chinese {
  display: block;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.65);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  margin-top: 1px;
}
.tile-price {
  font-weight: 700;
  font-size: 0.78rem;
  color: #fff;
  white-space: nowrap;
  flex-shrink: 0;
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  align-self: flex-end;
}

/* ---- Selection Checkmark ---- */
.tile-check {
  position: absolute;
  top: 8px; right: 8px;
  width: 28px; height: 28px;
  z-index: 3;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
}
.menu-tile.selected .tile-check { opacity: 1; transform: scale(1); }
.menu-tile.selected { outline: 2px solid #22c55e; outline-offset: -2px; }

/* ---- Receipt / Selection ---- */
.receipt {
  max-width: 420px;
  margin: 20px auto;
  padding: 24px 20px;
  background: #111;
  border: 1px dashed #333;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
}
.receipt-header { text-align: center; padding-bottom: 12px; border-bottom: 1px dashed #333; margin-bottom: 12px; }
.receipt-header h3 { font-size: 1.1rem; color: #fff; letter-spacing: 0.15em; font-weight: 700; }
.receipt-header p { font-size: 0.65rem; color: #555; margin-top: 4px; }
.receipt-empty { text-align: center; padding: 40px 0; color: #444; font-size: 0.8rem; }
.receipt-items { list-style: none; }
.receipt-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dotted #222; gap: 8px; }
.receipt-item:last-child { border-bottom: none; }
.receipt-item-left { flex: 1; min-width: 0; }
.receipt-item-name { display: block; font-size: 0.75rem; color: #ccc; }
.receipt-item-chinese { display: block; font-size: 0.6rem; color: #555; margin-top: 1px; }
.receipt-item-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.qty-controls { display: flex; align-items: center; gap: 0; border: 1px solid #333; border-radius: 6px; overflow: hidden; }
.qty-btn { width: 28px; height: 28px; background: #1a1a1a; border: none; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
.qty-btn:active { background: #333; }
.qty-num { width: 28px; text-align: center; font-size: 0.75rem; font-weight: 600; color: #fff; background: #111; }
.receipt-item-price { font-size: 0.78rem; color: #ccc; white-space: nowrap; text-align: right; min-width: 55px; }
.clear-btn { display: block; width: 100%; margin-top: 12px; padding: 10px; background: none; border: 1px solid #333; border-radius: 8px; color: #666; font-family: inherit; font-size: 0.72rem; cursor: pointer; transition: all 0.15s; }
.clear-btn:active { background: #1a1a1a; color: #c41e3a; border-color: #c41e3a; }
.receipt-total { display: flex; justify-content: space-between; align-items: baseline; padding: 12px 0 4px; margin-top: 8px; border-top: 2px solid #333; font-weight: 700; }
.receipt-total-label { font-size: 0.85rem; color: #fff; }
.receipt-total-amount { font-size: 1rem; color: #22c55e; }
.receipt-count { text-align: center; font-size: 0.65rem; color: #555; margin-top: 8px; }
.selection-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; border-radius: 9px; background: #22c55e; color: #000; font-size: 0.6rem; font-weight: 700; margin-left: 6px; padding: 0 5px; vertical-align: middle; }

/* ---- Container ---- */
.container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px 8px 80px; }

/* ---- Sections ---- */
.menu-section { margin-bottom: 28px; }
.section-header { text-align: center; padding: 16px 8px 8px; }
.section-chinese { display: block; font-size: 1.1rem; color: #c41e3a; letter-spacing: 0.1em; }
.section-title { font-weight: 600; font-size: 0.95rem; color: #ccc; letter-spacing: 0.02em; }

/* ---- Allergens ---- */
.allergen-badge { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; font-size: 0.55rem; font-weight: 600; border-radius: 50%; background: rgba(255,255,255,0.07); color: #888; border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0; }

/* ---- Drinks ---- */
.drink-section .drink-list { background: #141414; border-radius: 12px; overflow: hidden; }
.drink-row { display: flex; align-items: baseline; padding: 7px 12px; gap: 6px; border-bottom: 1px solid rgba(255,255,255,0.04); cursor: pointer; transition: background 0.15s; }
.drink-row:last-child { border-bottom: none; }
.drink-row:active { background: rgba(34,197,94,0.08); }
.drink-row.selected { background: rgba(34,197,94,0.1); }
.drink-check { opacity: 0; transition: opacity 0.2s; flex-shrink: 0; }
.drink-row.selected .drink-check { opacity: 1; }
.drink-name { flex: 1; font-size: 0.74rem; font-weight: 500; color: #bbb; min-width: 0; }
.drink-detail { font-size: 0.62rem; color: #555; white-space: nowrap; }
.drink-price { font-weight: 600; font-size: 0.74rem; color: #c41e3a; white-space: nowrap; text-align: right; min-width: 70px; }

/* ---- Allergen Legend ---- */
.allergen-legend { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; background: #141414; border-radius: 12px; padding: 14px; margin-top: 6px; }
.legend-item { font-size: 0.65rem; color: #777; display: flex; align-items: center; gap: 5px; }

/* ---- Footer ---- */
.site-footer { text-align: center; padding: 20px 16px 40px; font-size: 0.65rem; color: #444; line-height: 1.8; }

/* ---- Currency Converter ---- */
.currency-btn {
  position: absolute;
  top: 14px; right: 12px;
  padding: 4px 10px;
  border-radius: 14px;
  border: 1.5px solid #333;
  background: transparent;
  font-family: inherit;
  font-size: 0.7rem;
  font-weight: 600;
  color: #888;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 101;
}
.currency-btn:active { background: #c41e3a; color: #fff; border-color: #c41e3a; }

/* ---- Print ---- */
@media print {
  body { background: #fff; color: #222; }
  .site-header { background: #222 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; position: static; }
  .tile-name { color: #222; }
  .drink-section .drink-list { background: #f5f5f5; }
  .drink-name { color: #222; }
  .allergen-legend { background: #f5f5f5; }
  .legend-item { color: #555; }
}
</style>
</head>
<body>

<header class="site-header" style="position:relative">
  <div class="header-brand">RESTAURANT HERZIG</div>
  <div class="header-tagline">Wiener Küche · Vienna</div>
  <button class="currency-btn" id="currency-btn" onclick="cycleCurrency()">€</button>
  <div class="tab-bar">
    <button class="tab active" data-tab="menu">Menu</button>
    <button class="tab" data-tab="selection">Selection <span id="sel-badge" class="selection-badge" style="display:none">0</span></button>
  </div>
  <div class="cat-nav">
<button class="cat-pill cat-pill--active" data-cat="all">All</button>
<button class="cat-pill" data-cat="fine-dining-menüs">Fine Dining Menüs</button>
</div>
</header>

<div id="tab-menu" class="tab-content active">
<div class="menu-grid">
<div class="menu-tile" data-category-start="fine-dining-menüs" data-category="fine-dining-menüs" data-code="M1" data-name="Großes Menü" data-price="190" onclick="toggleSelect(this)">
  <div class="tile-image"><img src="./images/restaurant_herzig/M1.jpg" alt="Großes Menü" loading="lazy"></div>
  <div class="tile-check"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#22c55e" stroke="#fff" stroke-width="1.5"/><path d="M7 12.5l3 3 7-7" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="tile-caption">
    <div class="tile-name-wrap">
      <span class="tile-name">Großes Menü</span>
      <span class="tile-chinese">Large Menu</span>
    </div>
    <span class="tile-price">€190</span>
  </div>
</div>
<div class="menu-tile" data-category="fine-dining-menüs" data-code="M2" data-name="Kleines Menü" data-price="170" onclick="toggleSelect(this)">
  <div class="tile-image"><img src="./images/restaurant_herzig/M2.jpg" alt="Kleines Menü" loading="lazy"></div>
  <div class="tile-check"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#22c55e" stroke="#fff" stroke-width="1.5"/><path d="M7 12.5l3 3 7-7" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="tile-caption">
    <div class="tile-name-wrap">
      <span class="tile-name">Kleines Menü</span>
      <span class="tile-chinese">Small Menu</span>
    </div>
    <span class="tile-price">€170</span>
  </div>
</div>
<div class="menu-tile" data-category="fine-dining-menüs" data-code="M3" data-name="Gedeck" data-price="9" onclick="toggleSelect(this)">
  <div class="tile-image"><img src="./images/restaurant_herzig/M3.jpg" alt="Gedeck" loading="lazy"></div>
  <div class="tile-check"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="11" fill="#22c55e" stroke="#fff" stroke-width="1.5"/><path d="M7 12.5l3 3 7-7" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  <div class="tile-caption">
    <div class="tile-name-wrap">
      <span class="tile-name">Gedeck</span>
      <span class="tile-chinese">Cover Charge</span>
    </div>
    <span class="tile-price">€9</span>
  </div>
</div>
</div>

<div class="container">
<div id="drinks-anchor"></div>


</div>
</div>

<div id="tab-selection" class="tab-content">
  <div class="receipt" id="receipt">
    <div class="receipt-header">
      <h3>RESTAURANT HERZIG</h3>
      <p>Wiener Küche · Vienna</p>
      <p>Your Selection</p>
    </div>
    <div id="receipt-body">
      <p class="receipt-empty">Tap items on the menu to add them here</p>
    </div>
  </div>
</div>

<footer class="site-footer">
  <div>&copy; Restaurant Herzig</div>
</footer>

<script>
// ---- Tab switching ----
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    const catNav = document.querySelector('.cat-nav');
    if (catNav) catNav.style.display = btn.dataset.tab === 'menu' ? 'flex' : 'none';
    window.scrollTo(0, 0);
  });
});

// ---- Category pill navigation ----
document.querySelectorAll('.cat-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('cat-pill--active'));
    pill.classList.add('cat-pill--active');
    const cat = pill.dataset.cat;
    if (cat === 'all') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
    if (cat === 'drinks') {
      const anchor = document.getElementById('drinks-anchor');
      if (anchor) {
        const hdrH = document.querySelector('.site-header').offsetHeight;
        const y = anchor.getBoundingClientRect().top + window.scrollY - hdrH - 4;
        window.scrollTo({ top: y, behavior: 'smooth' });
      }
      return;
    }
    const sentinel = document.querySelector('#tab-menu [data-category-start="' + cat + '"]');
    if (sentinel) {
      const hdrH = document.querySelector('.site-header').offsetHeight;
      const y = sentinel.getBoundingClientRect().top + window.scrollY - hdrH - 4;
      window.scrollTo({ top: y, behavior: 'smooth' });
    }
  });
});

// ---- Auto-highlight pill on scroll ----
const catNav = document.querySelector('.cat-nav');
if (catNav) {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const cat = entry.target.getAttribute('data-category-start');
        if (cat) {
          document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('cat-pill--active'));
          const pill = document.querySelector('.cat-pill[data-cat="' + cat + '"]');
          if (pill) {
            pill.classList.add('cat-pill--active');
            pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        }
      }
    });
  }, { rootMargin: '-' + catNav.offsetHeight + 'px 0px -80% 0px', threshold: 0 });
  document.querySelectorAll('[data-category-start]').forEach(el => observer.observe(el));
}

// ---- Config ----
const SOURCE_CURRENCY = 'EUR';
const CURRENCY = '€';

// ---- Currency Converter ----
const RATES = { EUR: 0.92, USD: 1.00, GBP: 0.79, AUD: 1.54, CAD: 1.36 };
const SYMBOLS = { EUR: '€', USD: '$', GBP: '£', AUD: 'A$', CAD: 'C$' };
const CURRENCY_ORDER = ['EUR', 'USD', 'GBP', 'AUD', 'CAD'];
let currentCurrency = localStorage.getItem('mv_currency') || SOURCE_CURRENCY;
if (!RATES[currentCurrency]) currentCurrency = SOURCE_CURRENCY;

function convertPrice(amount, from, to) {
  if (!RATES[from] || !RATES[to]) return amount;
  return (amount / RATES[from]) * RATES[to];
}

function cycleCurrency() {
  const idx = CURRENCY_ORDER.indexOf(currentCurrency);
  currentCurrency = CURRENCY_ORDER[(idx + 1) % CURRENCY_ORDER.length];
  localStorage.setItem('mv_currency', currentCurrency);
  applyConversion();
}

function applyConversion() {
  const sym = SYMBOLS[currentCurrency] || currentCurrency;
  document.getElementById('currency-btn').textContent = sym;
  // Update food tile prices
  document.querySelectorAll('.tile-price').forEach(el => {
    const tile = el.closest('[data-price]');
    if (!tile) return;
    const orig = parseFloat(tile.dataset.price);
    if (isNaN(orig) || orig === 0) return;
    const converted = convertPrice(orig, SOURCE_CURRENCY, currentCurrency);
    el.textContent = sym + converted.toFixed(2).replace('.', ',');
  });
  // Update drink prices
  document.querySelectorAll('.drink-row').forEach(el => {
    const orig = parseFloat(el.dataset.price);
    if (isNaN(orig) || orig === 0) return;
    const converted = convertPrice(orig, SOURCE_CURRENCY, currentCurrency);
    const priceEl = el.querySelector('.drink-price');
    if (priceEl) priceEl.textContent = sym + converted.toFixed(2).replace('.', ',');
  });
}

// Apply saved currency on load
if (currentCurrency !== SOURCE_CURRENCY) { applyConversion(); }

// ---- HTML escaping for safe innerHTML ----
function escapeHtml(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}

// ---- Selection / Receipt system ----
const selected = new Map();

function toggleSelect(el) {
  const code = el.dataset.code;
  const name = el.dataset.name;
  const price = el.dataset.price;
  const chEl = el.querySelector('.tile-chinese');
  const chinese = chEl ? chEl.textContent : '';

  if (selected.has(code)) {
    selected.delete(code);
    el.classList.remove('selected');
  } else {
    selected.set(code, { name, price, chinese, qty: 1 });
    el.classList.add('selected');
  }
  updateReceipt();
}

function changeQty(code, delta) {
  const item = selected.get(code);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) {
    selected.delete(code);
    document.querySelectorAll('[data-code="' + CSS.escape(code) + '"]').forEach(el => el.classList.remove('selected'));
  }
  updateReceipt();
}

function clearAll() {
  selected.clear();
  document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
  updateReceipt();
}

function parsePrice(p) {
  const matches = p.match(/(\d+[,.]\d+)/g);
  if (matches) return parseFloat(matches[matches.length - 1].replace(',', '.'));
  return 0;
}

function updateReceipt() {
  const badge = document.getElementById('sel-badge');
  const body = document.getElementById('receipt-body');
  let totalItems = 0;
  selected.forEach(item => totalItems += item.qty);

  if (totalItems > 0) {
    badge.textContent = totalItems;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }

  if (selected.size === 0) {
    body.innerHTML = '<p class="receipt-empty">Tap items on the menu to add them here</p>';
    return;
  }

  let total = 0;
  let html = '<ul class="receipt-items">';
  selected.forEach((item, code) => {
    const unitPriceOrig = parsePrice(item.price);
    const unitPrice = convertPrice(unitPriceOrig, SOURCE_CURRENCY, currentCurrency);
    const lineTotal = unitPrice * item.qty;
    total += lineTotal;
    const chineseSpan = item.chinese ? '<span class="receipt-item-chinese">' + escapeHtml(item.chinese) + '</span>' : '';
    html += '<li class="receipt-item">';
    html += '<div class="receipt-item-left">';
    html += '<span class="receipt-item-name">' + escapeHtml(item.name) + '</span>';
    if (chineseSpan) html += chineseSpan;
    html += '</div>';
    html += '<div class="receipt-item-right">';
    html += '<div class="qty-controls">';
    html += '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\'' + code.replace(/'/g,"\\'") + '\',-1)">−</button>';
    html += '<span class="qty-num">' + item.qty + '</span>';
    html += '<button class="qty-btn" onclick="event.stopPropagation();changeQty(\'' + code.replace(/'/g,"\\'") + '\',1)">+</button>';
    html += '</div>';
    const curSym = SYMBOLS[currentCurrency] || CURRENCY;
    html += '<span class="receipt-item-price">' + curSym + lineTotal.toFixed(2).replace('.', ',') + '</span>';
    html += '</div>';
    html += '</li>';
  });
  html += '</ul>';
  html += '<div class="receipt-total">';
  html += '<span class="receipt-total-label">TOTAL</span>';
  const totalSym = SYMBOLS[currentCurrency] || CURRENCY;
  html += '<span class="receipt-total-amount">' + totalSym + total.toFixed(2).replace('.', ',') + '</span>';
  html += '</div>';
  html += '<p class="receipt-count">' + totalItems + ' item' + (totalItems !== 1 ? 's' : '') + '</p>';
  html += '<button class="clear-btn" onclick="clearAll()">Clear All</button>';

  body.innerHTML = html;
}
</script>

</body>
</html>
